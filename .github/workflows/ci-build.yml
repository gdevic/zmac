name: CI Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential bison gzip

      - name: Build
        working-directory: src
        run: make CFLAGS="-std=gnu89"

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/zmac-linux-x64.tar.gz -C src zmac

      - uses: actions/upload-artifact@v4
        with:
          name: zmac-linux-x64
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gcc bison
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Build
        working-directory: src
        run: |
          GCC=$(find "$(brew --prefix gcc)/bin" -name 'gcc-[0-9]*' -not -name '*c++*' | head -1)
          make CC="$GCC" CFLAGS="-std=gnu89"

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/zmac-macos-arm64.tar.gz -C src zmac

      - uses: actions/upload-artifact@v4
        with:
          name: zmac-macos-arm64
          path: dist/*

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            make
            bison
            gzip
            zip

      - name: Build
        working-directory: src
        run: make CFLAGS="-std=gnu89"

      - name: Package
        run: |
          mkdir -p dist
          zip -j dist/zmac-windows-x64.zip src/zmac.exe

      - uses: actions/upload-artifact@v4
        with:
          name: zmac-windows-x64
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "zmac ${{ github.ref_name }}"
          body: "Cross-platform build artifacts for zmac ${{ github.ref_name }}."
          files: release-artifacts/*
